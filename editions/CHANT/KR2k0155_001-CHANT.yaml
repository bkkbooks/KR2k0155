body:
  text: 宋劉澂之永初山川記高祖即帝位於氾水之陽黎陽有白馬塞孟達登之長歎譙郡酇縣東忠有棘津亭故邑呂尚所困處也介山即汾山子推逃隱於是山陸渾縣有孤山西有伏流陂大石山在洛東北新安有澗水源山北縣又有淵水未知其源孝水出擅山擅山在宜陽縣西在穀水南洛陽城之西面有陽渠周公制之也有水從沔陽縣南至梓潼漢壽入大穴暗通口山水經濮水源出大騩山東北流注泗衛靈聞音於水上殊為乖矣蕭縣南有冒山白溝水安陂水旁有凌冢彭城西南有彌黎城東莞縣箕山許由之所隱陶朱冢在華容縣之西南夏水古文以為滄浪䱷水所歌也沅水自胡須枝分跨三十三渡逕交阯龍編縣東北入於海黃水東北流一涯谿通四會贛縣東南有章水西有貢水縣治二水之間二水合贛字因以名縣焉三澨在竟陵縣界並水經注蒲坂城中有舜廟城外有舜宅及二妃壇史記正義寧州鄣氣罔露四時不絕菵草名有毒其上露觸之肉即潰瀾肴有純石或謂石肴北海有鄭元儒林講堂永康縣縉雲堂黃帝鍊丹處彭城西南有項羽戲馬臺魏武聽政殿前有聽政門興平縣蔡子池南有石穴深二百許丈石青色堪為硯宜都郡有二大石一為陽一為陰鞭陰石則雨鞭陽石則晴梓澤地名去王城二十四里費縣有積弩堂廣陵縣東有梅池建城縣西有羊山有然石色黃白而理疏以水灌之便熱可煮物故謂之然石艾縣有熱泉如湯以生物投之須臾爛熟並初學記大伾古黎國也詩云黎侯寓於衛以中露泥中二句觀之乃國名也宛陵北有敬亭山山有神祠即謝眺賽雨賦詩之所其神云梓華府君頗有靈驗昭山下有泉潭深無底是湘水最深之處昔有舟人沒於此潭其糟并甑有名題號後於洞庭尋得即知暗通也漢水古為滄浪即魚父所云滄浪之水清兮今滄浪之水合流出鐔去北界山北蓋後人名之非古滄浪也安定處山谷之間昆戎舊壤迫近夷狄修習武備人皆以馳射為事鼓山有石鼓形二所南北相當二鼓相去十里九真都龍縣有雷廬羊大如犦牛髯蛇吞鹿至角乃止始興郡有大蛇名青蔥有大蛇名赤頸石鄉有石室有仉生者居焉祝雞翁者洛陽人居尸鄉山下飬雞百餘年昌陽縣有昌水安邑有昆吾亭古昆吾國也臨安縣有石鏡在山之東峰安帝義熙元年省射陽縣分廣陵之鹽城地立山陽東城左鄉三縣為山陽郡屬南徐山沔陽縣東有魯山山上有胡公祠安陸居鄖城吉陽縣西有九宗山雲夢澤一名巴邱湖荊州之藪故魏武帝與吳主書云赤壁之困過雲夢澤中有大霧遂便失道並寰宇記
